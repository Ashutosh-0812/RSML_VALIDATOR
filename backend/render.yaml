services:
  - type: web
    name: rsml-validator-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # You'll set this in Render dashboard with your Atlas connection string
      - key: JWT_SECRET
        sync: false  # You'll set this in Render dashboard
      - key: CORS_ORIGIN
        value: "*"  # Allow all origins
    healthCheckPath: /